name:        flatparse-util
version:     0.0.1
license:     BSD3
author:      John Wiegley
maintainer:  johnw@newartisans.com
description: Combinators and utilities for flatparse

ghc-options:
  - -Wall
  - -Wno-missing-home-modules
  - -fprof-auto

dependencies:
  - base >= 4.5
  - bytestring
  - flatparse
  - mtl

library:
  source-dirs: src
  exposed-modules:
    - FlatParse.Combinators

tests:
  flatparse-util-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - flatparse-util
      - tasty
      - tasty-hunit
