name:        org-print
version:     0.0.1
license:     BSD3
author:      John Wiegley
maintainer:  johnw@newartisans.com
description: Org-mode parser and data drier

ghc-options:
  - -Wall
  - -Wno-missing-home-modules
  - -fprof-auto

dependencies:
  - base >= 4.5
  - mtl
  - regex-tdfa
  - time

library:
  source-dirs: src
  exposed-modules:
    - Org.Print
  dependencies:
    - org-types

tests:
  org-print-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - deepseq
      - mtl
      - org-print
      - org-types
      - tasty
      - tasty-hunit
