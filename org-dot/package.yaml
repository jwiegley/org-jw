name:        org-dot
version:     0.0.1
license:     BSD3
author:      John Wiegley
maintainer:  johnw@newartisans.com
description: Graphviz DOT generation from Org-mode relationship data

ghc-options:
  - -Wall
  - -Wno-missing-home-modules
  - -fprof-auto

dependencies:
  - base >= 4.5
  - containers
  - graphviz
  - text

library:
  source-dirs: src
  exposed-modules:
    - Org.Dot
  dependencies:
    - org-types
    - org-db
