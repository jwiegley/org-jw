pre-commit:
  parallel: true
  commands:
    fourmolu:
      glob: "*.hs"
      run: >-
        fourmolu --mode check
        {staged_files}
    hlint:
      glob: "*.hs"
      run: >-
        hlint
        {staged_files}
    build:
      glob: "*.{hs,yaml,cabal}"
      run: cabal build all --ghc-options="-Werror"

pre-push:
  parallel: false
  commands:
    round-trip:
      priority: 1
      glob: "*.hs"
      run: make all
    perf:
      priority: 2
      glob: "*.hs"
      run: scripts/check-perf.sh
    coverage:
      priority: 3
      glob: "*.hs"
      run: scripts/check-coverage.sh
